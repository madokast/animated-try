<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Anki Connect</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <div x-data="anki" style="max-width:400px;margin:40px auto">
    <div>
      <label>URL<input x-model="url" style="width:100%"></label>
    </div>
    <div>
      <label>Key<input x-model="key" style="width:100%"></label>
    </div>
    <div style="margin-top:8px">
      <button @click="connect">连接</button>
      <span x-text="status"></span>
    </div>

    <footer style="margin-top:16px;border-top:1px solid #ccc;padding-top:8px" x-show="stats.new + stats.learn + stats.review > 0">
      新<span x-text="stats.new"></span>
      学习<span x-text="stats.learn"></span>
      复习<span x-text="stats.review"></span>
      共<span x-text="stats.total"></span>
    </footer>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('anki', () => ({
        url: 'http://127.0.0.1:8765',
        key: '',
        status: '',
        stats: { new: 0, learn: 0, review: 0, total: 0 },
        async anki(action, params = {}) {
          const body = { action, version: 6 }
          if (this.key) body.key = this.key
          if (Object.keys(params).length) body.params = params
          const resp = await fetch(this.url, {
            method: 'POST',
            body: JSON.stringify(body)
          })
          const data = await resp.json()
          if (data.error) throw new Error(data.error)
          return data.result
        },
        async connect() {
          this.status = '连接中...'
          try {
            const ver = await this.anki('version')
            this.status = `已连接 (API v${ver})`

            const [a, b, c, d] = await Promise.all([
              this.anki('findCards', { query: 'is:new' }),
              this.anki('findCards', { query: 'is:learn' }),
              this.anki('findCards', { query: 'is:review' }),
              this.anki('findCards', { query: '' }),
            ])
            this.stats = { new: a.length, learn: b.length, review: c.length, total: d.length }
          } catch (e) {
            this.status = '失败: ' + e.message
          }
        }
      }))
    })
  </script>
</body>
</html>
