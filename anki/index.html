<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anki Connect</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <div x-data="anki" style="max-width:960px;margin:40px auto" @keydown.window="onKeyDown" @keyup.window="onKeyUp">
    <div style="display:flex;gap:8px;align-items:center">
      <label style="flex:1;display:flex;align-items:center;gap:4px">URL<input x-model="url" style="flex:1"></label>
      <label style="flex:1;display:flex;align-items:center;gap:4px">Key<input x-model="key" style="flex:1"></label>
      <button @click="connect">Connect</button>
    </div>

    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:16px">
      <template x-for="card in cards">
         <div style="border:1px solid #ccc;min-height:320px;flex:0 0 calc(33.333% - 6px);box-sizing:border-box;position:relative;text-align:center" @mousedown="mouseDown(cards.indexOf(card))" @mouseup="mouseUp(cards.indexOf(card))">
          <div style="position:absolute;top:4px;left:6px;font-size:12px;color:#999;pointer-events:none" x-text="card.deck"></div>
          <div style="position:absolute;top:4px;right:6px;font-size:12px;pointer-events:none" x-text="card.state" :style="card.state === 'E' ? 'color:red' : 'color:#999'"></div>
          <div style="padding:20px 12px 12px" x-html="card.front"></div>
          <hr style="margin:8px 12px" x-show="card.state === 'A'">
          <div style="padding:0 12px 12px" x-show="card.state === 'A'" x-html="card.back"></div>
        </div>
      </template>
      <template x-for="i in (6 - cards.length)">
        <div style="border:1px solid #ccc;min-height:320px;flex:0 0 calc(33.333% - 6px);box-sizing:border-box;padding:12px">
          <div style="background:#eee;height:16px;width:80%;margin:0 auto 8px"></div>
          <div style="background:#eee;height:16px;width:60%;margin:0 auto"></div>
        </div>
      </template>
    </div>

    <footer style="margin-top:16px;border-top:1px solid #ccc;padding-top:8px;display:flex;justify-content:space-between">
      <span x-text="status"></span>
      <span>New <span x-text="stats.new"></span> &middot; Due <span x-text="stats.due"></span></span>
    </footer>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('anki', () => ({
        url: 'http://127.0.0.1:8765',
        key: '',
        status: '',
        stats: { new: 0, due: 0 },
        cards: [],
        _kt: {},
        _mt: {},
        async anki(action, params = {}) {
          const body = { action, version: 6 }
          if (this.key) body.key = this.key
          if (Object.keys(params).length) body.params = params
          const resp = await fetch(this.url, {
            method: 'POST',
            body: JSON.stringify(body)
          })
          const data = await resp.json()
          if (data.error) throw new Error(data.error)
          return data.result
        },
        async connect() {
          this.status = 'Connecting...'
          try {
            const ver = await this.anki('version')
            this.status = `Connected (API v${ver})`
            await this.loadCards()
          } catch (e) {
            this.status = 'Failed: ' + e.message
          }
        },
        async loadCards() {
          const [a, b, ids] = await Promise.all([
            this.anki('findCards', { query: 'is:new' }),
            this.anki('findCards', { query: 'is:due' }),
            this.anki('findCards', { query: 'is:new OR is:due' }),
          ])
          this.stats = { new: a.length, due: b.length }

          this.shuffle(ids)
          const top = ids.slice(0, 6)
          if (top.length) {
            const info = await this.anki('cardsInfo', { cards: top })
            this.cards = info.map(c => ({
              id: c.cardId,
              state: 'R',
              deck: c.deckName,
              front: c.fields.Front?.value ?? Object.values(c.fields)[0]?.value ?? '',
              back: c.fields.Back?.value ?? Object.values(c.fields)[1]?.value ?? ''
            }))
          } else {
            this.cards = []
          }
          this.status = this.cards.length
            ? `Display ${this.cards.length} card(s)`
            : 'All cards completed, congratulations!'
        },
        shuffle(arr) {
          for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1))
            ;[arr[i], arr[j]] = [arr[j], arr[i]]
          }
        },
        cycle(i) {
          const c = this.cards[i]
          if (!c) return
          const order = ['R', 'A', 'E']
          const idx = order.indexOf(c.state)
          c.state = order[(idx + 1) % 3]
        },
        onKeyDown(e) {
          if (e.repeat) return
          this._kt[e.key] = Date.now()
        },
        onKeyUp(e) {
          const elapsed = Date.now() - (this._kt[e.key] || 0)
          if (elapsed > 300) return
          if (e.key === 'Enter') { e.preventDefault(); this.submit() }
          else {
            const map = { q:0,w:1,e:2,a:3,s:4,d:5, '1':0,'2':1,'3':2,'4':3,'5':4,'6':5 }
            const i = map[e.key.toLowerCase()]
            if (i !== undefined) this.cycle(i)
          }
        },
        mouseDown(i) { this._mt[i] = Date.now() },
        mouseUp(i) {
          const elapsed = Date.now() - (this._mt[i] || 0)
          if (elapsed <= 300) this.cycle(i)
        },
        async submit() {
          const unreviewed = this.cards.some(c => c.state === 'R')
          if (unreviewed) {
            this.cards.forEach(c => { if (c.state === 'R') c.state = 'A' })
            this.status = 'All revealed'
            return
          }
          let again = 0, good = 0
          const answers = this.cards.map(c => {
            if (c.state === 'E') { again++; return { cardId: c.id, ease: 1 } }
            else { good++; return { cardId: c.id, ease: 3 } }
          })
          if (!answers.length) return
          this.status = `Do Answer with Again ${again} Good ${good}`
          try {
            await this.anki('answerCards', { answers })
            await this.loadCards()
          } catch (e) {
            this.status = 'Submit failed: ' + e.message
          }
        }
      }))
    })
  </script>
</body>
</html>
