<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anki Connect</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    html, body { margin: 0; height: 100%; font-size: 24px; }
    input, button { font-size: inherit; }
  </style>
</head>
<body>
  <div x-data="help" style="position:fixed;top:8px;right:8px;z-index:100">
    <button @click="open = !open" style="font-size:18px">?</button>
    <div x-show="open" style="position:fixed;top:0;right:0;width:320px;height:100%;background:#fff;border-left:1px solid #ccc;overflow-y:auto;font-size:16px;padding:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <button @click="lang = lang === 'zh' ? 'en' : 'zh'" x-text="lang === 'zh' ? 'EN' : '中'"></button>
        <button @click="open = false">Hide</button>
      </div>
      <template x-if="lang === 'zh'">
        <div>
          <p>需安装 <a href="https://ankiweb.net/shared/info/2055492159" target="_blank">Anki-Connect</a> 插件 (Code: 2055492159)</p>
          <p><strong>操作</strong></p>
          <ul>
            <li>1-6 / qweasd / 鼠标点击 对应卡片，循环切换 Front→Good→Again→Front...</li>
            <li>Enter 揭示所有 Front，若已全部揭示则提交评分</li>
          </ul>
          <p><strong>状态说明</strong></p>
          <ul>
            <li><span style="color:#999">Front</span> 仅显示正面，待作答</li>
            <li><span style="color:green">Good</span> 已揭示答案，认为掌握</li>
            <li><span style="color:red">Again</span> 标记为未掌握，需重学</li>
          </ul>
          <p><strong>评分规则</strong></p>
          <ul>
            <li>Again 按 Again(1) 重来</li>
            <li>其他 按 Good(3) 正确</li>
          </ul>
        </div>
      </template>
      <template x-if="lang === 'en'">
        <div>
          <p>Requires <a href="https://ankiweb.net/shared/info/2055492159" target="_blank">Anki-Connect</a> add-on (Code: 2055492159)</p>
          <p><strong>Controls</strong></p>
          <ul>
            <li>1-6 / qweasd / click to cycle Front→Good→Again→Front...</li>
            <li>Enter reveals all Front, submits if all revealed</li>
          </ul>
          <p><strong>States</strong></p>
          <ul>
            <li><span style="color:#999">Front</span> Question only, waiting for answer</li>
            <li><span style="color:green">Good</span> Answer revealed, marked as known</li>
            <li><span style="color:red">Again</span> Marked as forgotten, needs relearning</li>
          </ul>
          <p><strong>Scoring</strong></p>
          <ul>
            <li>Again scored as Again(1) wrong</li>
            <li>Else scored as Good(3) correct</li>
          </ul>
        </div>
      </template>
      <div style="margin-top:16px;border-top:1px solid #eee;padding-top:8px">
        <strong x-text="lang === 'zh' ? '最近记录' : 'Recent Log'"></strong>
        <div style="max-height:240px;overflow-y:auto;margin-top:4px">
          <template x-for="item in $store.log">
            <div style="display:flex;justify-content:space-between;font-size:14px;padding:2px 0;gap:8px">
              <span x-text="item.text" style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis"></span>
              <span x-text="item.result" :style="item.result === 'Again' ? 'color:red' : 'color:green'" style="flex-shrink:0"></span>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>
  <div x-data="anki" style="max-width:960px;margin:0 auto;min-height:600px;height:100%;display:grid;grid-template-rows:auto 1fr 36px" @keydown.window="onKeyDown" @keyup.window="onKeyUp">
    <div style="display:flex;gap:8px;align-items:center">
      <label style="flex:1;display:flex;align-items:center;gap:4px">URL<input x-model="url" style="flex:1"></label>
      <label style="flex:1;display:flex;align-items:center;gap:4px">Key<input x-model="key" style="flex:1" type="password"></label>
      <button @click="connect">Connect</button>
    </div>

    <div style="display:flex;flex-wrap:wrap;gap:8px;align-content:stretch;overflow:hidden;padding-top:15px">
      <template x-for="(card, i) in cards">
        <div style="border:1px solid #ccc;height:calc(50% - 4px);min-height:150px;flex:0 0 calc(33.333% - 6px);box-sizing:border-box;position:relative;text-align:center" @mousedown="mouseDown(i)" @mouseup="mouseUp(i)">
          <div style="position:absolute;top:4px;left:10px;font-size:18px;color:#999;pointer-events:none" x-text="card.deck"></div>
          <div style="position:absolute;top:4px;right:10px;font-size:18px;pointer-events:none"><span x-text="card.state" :style="card.state === 'Again' ? 'color:red' : (card.state === 'Good' ? 'color:green' : 'color:#999')"></span></div>
          <div style="padding:20px 12px 12px" x-html="card.front"></div>
          <hr style="margin:8px 12px" x-show="card.state === 'Good' || card.state === 'Again'">
          <div style="padding:0 12px 12px" x-show="card.state === 'Good' || card.state === 'Again'" x-html="card.back"></div>
          <div style="position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:32px;color:#ddd;pointer-events:none" x-text="['1 Q','2 W','3 E','4 A','5 S','6 D'][i]"></div>
        </div>
      </template>
      <template x-for="i in [...Array(6 - cards.length).keys()]">
        <div style="border:1px solid #ccc;height:calc(50% - 4px);min-height:150px;flex:0 0 calc(33.333% - 6px);box-sizing:border-box;padding:12px;position:relative">
          <div style="background:#eee;height:16px;width:80%;margin:0 auto 8px"></div>
          <div style="background:#eee;height:16px;width:60%;margin:0 auto"></div>
          <div style="position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:32px;color:#ddd;pointer-events:none" x-text="['1 Q','2 W','3 E','4 A','5 S','6 D'][cards.length + i]"></div>
        </div>
      </template>
    </div>

    <footer style="border-top:1px solid #ccc;display:flex;align-items:center;justify-content:space-between;font-size:20px">
      <span x-text="status"></span>
      <span>New <span x-text="stats.new"></span> &middot; Due <span x-text="stats.due"></span></span>
    </footer>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.store('log', [])
      Alpine.data('help', () => ({
        open: true,
        lang: 'zh'
      }))
      Alpine.data('anki', () => ({
        url: 'http://127.0.0.1:8765',
        key: '',
        status: '',
        stats: { new: 0, due: 0 },
        cards: [],
        _kt: {},
        _mt: {},
        async anki(action, params = {}) {
          const body = { action, version: 6 }
          if (this.key) body.key = this.key
          if (Object.keys(params).length) body.params = params
          const resp = await fetch(this.url, {
            method: 'POST',
            body: JSON.stringify(body)
          })
          const data = await resp.json()
          if (data.error) throw new Error(data.error)
          return data.result
        },
        async connect() {
          this.status = 'Connecting...'
          try {
            const ver = await this.anki('version')
            this.status = `Connected (API v${ver})`
            await this.loadCards()
          } catch (e) {
            this.status = 'Failed: ' + e.message
          }
        },
        async loadCards() {
          const [a, b, ids] = await Promise.all([
            this.anki('findCards', { query: 'is:new' }),
            this.anki('findCards', { query: 'is:due' }),
            this.anki('findCards', { query: 'is:new OR is:due' }),
          ])
          this.stats = { new: a.length, due: b.length }

          this.shuffle(ids)
          const top = ids.slice(0, 6)
          if (top.length) {
            const info = await this.anki('cardsInfo', { cards: top })
            this.cards = info.map(c => ({
              id: c.cardId,
              state: 'Front',
              deck: c.deckName,
              front: c.fields.Front?.value ?? Object.values(c.fields)[0]?.value ?? '',
              back: c.fields.Back?.value ?? Object.values(c.fields)[1]?.value ?? ''
            }))
          } else {
            this.cards = []
          }
          this.status = this.cards.length
            ? `Display ${this.cards.length} card(s)`
            : 'All cards completed, congratulations!'
        },
        shuffle(arr) {
          for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1))
            ;[arr[i], arr[j]] = [arr[j], arr[i]]
          }
        },
        cycle(i) {
          const c = this.cards[i]
          if (!c) return
          const order = ['Front', 'Good', 'Again']
          const idx = order.indexOf(c.state)
          c.state = order[(idx + 1) % 3]
        },
        onKeyDown(e) {
          if (e.repeat) return
          this._kt[e.key] = Date.now()
        },
        onKeyUp(e) {
          const elapsed = Date.now() - (this._kt[e.key] || 0)
          if (elapsed > 300) return
          if (e.key === 'Enter') { e.preventDefault(); this.submit() }
          else {
            const map = { q:0,w:1,e:2,a:3,s:4,d:5, '1':0,'2':1,'3':2,'4':3,'5':4,'6':5 }
            const i = map[e.key.toLowerCase()]
            if (i !== undefined) this.cycle(i)
          }
        },
        mouseDown(i) { this._mt[i] = Date.now() },
        mouseUp(i) {
          const elapsed = Date.now() - (this._mt[i] || 0)
          if (elapsed <= 300) this.cycle(i)
        },
        async submit() {
          const unreviewed = this.cards.some(c => c.state === 'Front')
          if (unreviewed) {
            this.cards.forEach(c => { if (c.state === 'Front') c.state = 'Good' })
            this.status = 'All revealed'
            return
          }
          let again = 0, good = 0
          const answers = this.cards.map(c => {
            if (c.state === 'Again') { again++; return { cardId: c.id, ease: 1 } }
            else { good++; return { cardId: c.id, ease: 3 } }
          })
          this.cards.forEach(c => {
            this.$store.log.unshift({ text: c.front.replace(/<[^>]+>/g,' '), result: c.state === 'Again' ? 'Again' : 'Good' })
          })
          if (this.$store.log.length > 12) this.$store.log.length = 12
          if (!answers.length) return
          this.status = `Do Answer with Again ${again} Good ${good}`
          try {
            await this.anki('answerCards', { answers })
            await this.loadCards()
          } catch (e) {
            this.status = 'Submit failed: ' + e.message
          }
        }
      }))
    })
  </script>
</body>
</html>
