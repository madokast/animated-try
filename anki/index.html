<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anki Connect</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <div x-data="anki" style="max-width:960px;margin:40px auto" @keyup.window="onKey">
    <div style="display:flex;gap:8px;align-items:center">
      <label style="flex:1;display:flex;align-items:center;gap:4px">URL<input x-model="url" style="flex:1"></label>
      <label style="flex:1;display:flex;align-items:center;gap:4px">Key<input x-model="key" style="flex:1"></label>
      <button @click="connect">Connect</button>
    </div>

    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:16px">
      <template x-for="(card, i) in [...Array(6)]">
        <div style="border:1px solid #ccc;min-height:320px;flex:0 0 calc(33.333% - 6px);box-sizing:border-box;position:relative;text-align:center;cursor:pointer" @click="cycle(i)">
          <div style="position:absolute;top:4px;left:6px;font-size:12px;color:#999;pointer-events:none" x-show="cards[i]" x-text="cards[i]?.deck"></div>
          <div style="position:absolute;top:4px;right:6px;font-size:12px;pointer-events:none" x-show="cards[i]" x-text="cards[i]?.state" :style="cards[i]?.state === 'E' ? 'color:red' : 'color:#999'"></div>
          <div style="padding:20px 12px 12px" x-show="cards[i]" x-html="cards[i]?.front"></div>
          <hr style="margin:8px 12px" x-show="cards[i]?.state === 'A'">
          <div style="padding:0 12px 12px" x-show="cards[i]?.state === 'A'" x-html="cards[i]?.back"></div>
          <div style="padding:12px" x-show="!cards[i]">
            <div style="background:#eee;height:16px;width:80%;margin:0 auto 8px"></div>
            <div style="background:#eee;height:16px;width:60%;margin:0 auto"></div>
          </div>
        </div>
      </template>
    </div>

    <footer style="margin-top:16px;border-top:1px solid #ccc;padding-top:8px;display:flex;justify-content:space-between">
      <span x-text="status"></span>
      <span>New <span x-text="stats.new"></span> &middot; Due <span x-text="stats.due"></span></span>
    </footer>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('anki', () => ({
        url: 'http://127.0.0.1:8765',
        key: '',
        status: '',
        stats: { new: 0, due: 0 },
        cards: [],
        async anki(action, params = {}) {
          const body = { action, version: 6 }
          if (this.key) body.key = this.key
          if (Object.keys(params).length) body.params = params
          const resp = await fetch(this.url, {
            method: 'POST',
            body: JSON.stringify(body)
          })
          const data = await resp.json()
          if (data.error) throw new Error(data.error)
          return data.result
        },
        async connect() {
          this.status = 'Connecting...'
          try {
            const ver = await this.anki('version')
            this.status = `Connected (API v${ver})`

            const [a, b, ids] = await Promise.all([
              this.anki('findCards', { query: 'is:new' }),
              this.anki('findCards', { query: 'is:due' }),
              this.anki('findCards', { query: 'is:new OR is:due' }),
            ])
            this.stats = { new: a.length, due: b.length }

            const top = ids.slice(0, 6)
            const info = await this.anki('cardsInfo', { cards: top })
            this.cards = info.map(c => ({
              state: 'R',
              deck: c.deckName,
              front: c.fields.Front?.value ?? Object.values(c.fields)[0]?.value ?? '',
              back: c.fields.Back?.value ?? Object.values(c.fields)[1]?.value ?? ''
            }))
          } catch (e) {
            this.status = 'Failed: ' + e.message
          }
        },
        cycle(i) {
          const c = this.cards[i]
          if (!c) return
          const order = ['R', 'A', 'E']
          const idx = order.indexOf(c.state)
          c.state = order[(idx + 1) % 3]
        },
        onKey(e) {
          const n = parseInt(e.key)
          if (n >= 1 && n <= 6) this.cycle(n - 1)
        }
      }))
    })
  </script>
</body>
</html>
