<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anki Connect</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <div x-data="anki" style="max-width:640px;margin:40px auto">
    <div style="display:flex;gap:8px;align-items:center">
      <label style="flex:1;display:flex;align-items:center;gap:4px">URL<input x-model="url" style="flex:1"></label>
      <label style="flex:1;display:flex;align-items:center;gap:4px">Key<input x-model="key" style="flex:1"></label>
      <button @click="connect">Connect</button>
    </div>

    <footer style="margin-top:16px;border-top:1px solid #ccc;padding-top:8px;display:flex;justify-content:space-between">
      <span x-text="status"></span>
      <span>New <span x-text="stats.new"></span> &middot; Due <span x-text="stats.due"></span></span>
    </footer>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('anki', () => ({
        url: 'http://127.0.0.1:8765',
        key: '',
        status: '',
        stats: { new: 0, due: 0 },
        async anki(action, params = {}) {
          const body = { action, version: 6 }
          if (this.key) body.key = this.key
          if (Object.keys(params).length) body.params = params
          const resp = await fetch(this.url, {
            method: 'POST',
            body: JSON.stringify(body)
          })
          const data = await resp.json()
          if (data.error) throw new Error(data.error)
          return data.result
        },
        async connect() {
          this.status = 'Connecting...'
          try {
            const ver = await this.anki('version')
            this.status = `Connected (API v${ver})`

            const [a, b] = await Promise.all([
              this.anki('findCards', { query: 'is:new' }),
              this.anki('findCards', { query: 'is:due' }),
            ])
            this.stats = { new: a.length, due: b.length }
          } catch (e) {
            this.status = 'Failed: ' + e.message
          }
        }
      }))
    })
  </script>
</body>
</html>
